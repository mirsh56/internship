<!DOCTYPE html>
<html>
<head>
    <title>Array</title>
</head>
<body>

<button onclick="showItems()">Show Items</button>

<ul id="list"></ul>

<script>
let items = ["Lipstick", "Perfume", "Cream", "Eyeliner"];

function showItems() {
    let output = document.getElementById("list");
    output.innerHTML = "";

    for (let i = 0; i < items.length; i++) {
        let li = document.createElement("li");
        li.innerText = items[i];
        output.appendChild(li);
    }
}
</script>

</body>
</html>
