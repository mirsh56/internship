<!DOCTYPE html>
<html>
<head>
    <title>Event</title>
</head>
<body>

<!-- Button Click -->
<button onclick="showAlert()">Click Me</button>
<br><br>

<!-- Input Live Preview -->
<input type="text" onkeyup="liveText()" placeholder="Type here">
<p id="output"></p>

<!-- Form Submit -->
<form onsubmit="return submitForm()">
    <input type="text" id="name" placeholder="Enter name">
    <button type="submit">Submit</button>
</form>

<script>
function showAlert() {
    alert("Button Clicked");
}

function liveText() {
    let text = document.querySelector("input").value;
    document.getElementById("output").innerText = text;
}

function submitForm() {
    let n = document.getElementById("name").value;

    if (n == "") {
        alert("Name required");
        return false;
    }

    alert("Submitted");
    return false;
}
</script>

</body>
</html>
