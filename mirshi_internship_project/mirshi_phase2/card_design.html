<!DOCTYPE html>
<html>
<head>
<title>Laptop Card</title>
<style>
body { background:#111; display:flex; justify-content:center; align-items:center; height:100vh; }
.card {
  width:300px; padding:20px; background:#222; color:white;
  border-radius:15px; text-align:center; transition:0.3s;
}
.card:hover { transform:scale(1.05); }
img { width:100%; border-radius:10px; }
.price { color:lime; font-weight:bold; }
button { padding:10px; background:orange; border:none; cursor:pointer; }
</style>
</head>
<body>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71jG+e7roXL._SX679_.jpg">
<h2>HP Laptop</h2>
<p>Fast performance with SSD and 8GB RAM</p>
<div class="price">₹45,000</div>
<button>Buy Now</button>
</div>

</body>
</html>
