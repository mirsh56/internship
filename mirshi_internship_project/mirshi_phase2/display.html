<!DOCTYPE html>
<html>
<head>
<title>Display - Bags</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
}

/* Common style */
.box {
    padding: 15px;
    margin: 10px;
    background: #333;
}

/* Display types */
.block {
    display: block;
    background: teal;
}

.inline {
    display: inline;
    background: purple;
}

.inline-block {
    display: inline-block;
    width: 150px;
    background: orange;
    text-align: center;
}
</style>

</head>

<body>

<h1>Display Property - Bags</h1>

<!-- Block Example -->
<div class="box block">
    School Bag (Block - takes full width)
</div>

<!-- Inline Example -->
<span class="box inline">Hand Bag</span>
<span class="box inline">Travel Bag</span>

<!-- Inline-Block Example -->
<div class="box inline-block">
    Laptop Bag
</div>

<div class="box inline-block">
    Gym Bag
</div>

</body>
</html>
