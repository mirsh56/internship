<!DOCTYPE html>
<html>
<head>
<title>Flex Properties - Shoes</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* Flex Container */
.container {
    display: flex;
    justify-content: space-around;   /* space between items */
    align-items: center;             /* vertical align */
    flex-wrap: wrap;                 /* wrap on small screens */
    padding: 40px;
}

/* Shoe Cards */
.card {
    background: #222;
    width: 220px;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    text-align: center;
}

/* Image */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* Button */
button {
    margin-top: 10px;
    padding: 10px;
    background: orange;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<h1 style="text-align:center;">Shoe Collection</h1>

<div class="container">

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61utX8kBDlL._SY695_.jpg" alt="Nike Shoes">
        <h3>Nike Shoes</h3>
        <p>Comfortable running shoes</p>
        <button>Buy</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71Z6b1h6pAL._SY695_.jpg" alt="Adidas Shoes">
        <h3>Adidas Shoes</h3>
        <p>Stylish sports wear</p>
        <button>Buy</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71V4k2G6ZBL._SY695_.jpg" alt="Puma Shoes">
        <h3>Puma Shoes</h3>
        <p>Lightweight casual shoes</p>
        <button>Buy</button>
    </div>

</div>

</body>
</html>
