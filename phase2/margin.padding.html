<!DOCTYPE html>
<html>
<head>
<title>Margin & Padding Examples</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
}

/* Example 1: Margin */
.box1 {
    background: red;
    margin: 40px;   /* space outside */
    padding: 10px;
}

/* Example 2: Padding */
.box2 {
    background: green;
    margin: 20px;
    padding: 40px;  /* space inside */
}

/* Example 3: Margin + Padding */
.box3 {
    background: blue;
    margin: 50px;
    padding: 30px;
}
</style>

</head>

<body>

<h2>Margin & Padding Examples</h2>

<div class="box1">
    Example 1: Margin adds space outside the box
</div>

<div class="box2">
    Example 2: Padding adds space inside the box
</div>

<div class="box3">
    Example 3: Both margin and padding used together
</div>

</body>
</html>
