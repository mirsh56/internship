<!DOCTYPE html>
<html>
<head>
<title>Responsive Design</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 50px;
}

/* Image */
.container img {
    width: 300px;
    border-radius: 10px;
}

/* Text */
.text {
    max-width: 400px;
}

/* Button */
button {
    padding: 10px 20px;
    background: cyan;
    border: none;
    cursor: pointer;
}

/* Responsive (Mobile View) */
@media (max-width: 600px) {
    .container {
        flex-direction: column; /* stack */
        text-align: center;
    }

    .container img {
        width: 80%;
    }
}
</style>

</head>

<body>

<h1 style="text-align:center;">Smart Watch</h1>

<div class="container">

    <img src="https://m.media-amazon.com/images/I/71f5Eu5lJSL._SX695_.jpg" alt="Smart Watch">

    <div class="text">
        <h2>Noise Smart Watch</h2>
        <p>Track your fitness, heart rate, sleep and more with stylish design.</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
